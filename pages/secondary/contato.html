<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="../../assets/icons/Logo.svg"
        />
        <title>Contate-nos - Lentes do Tempo</title>
        <meta
            name="description"
            content="Entre em contato com a Lentes do Tempo"
        />
        <link rel="stylesheet" href="../../css/global.css" />
        <link rel="stylesheet" href="../../css/components/header.css" />
        <link rel="stylesheet" href="../../css/pages/secondary/contato.css" />
        <link rel="stylesheet" href="../../css/components/footer.css" />
        <link rel="stylesheet" href="../../css/motions/transition.css" />
        <script src="../../js/components/header.js" defer></script>
        <script src="../../js/components/footer.js" defer></script>
        <script src="../../js/motions/transition.js" defer></script>
    </head>
    <body>
        <header-component></header-component>
        <main>
            <h1>Contate-nos</h1>
            <section class="contact">
                <div class="contact__info">
                    <div class="contact__item">
                        <h2>Telefone</h2>
                        <p><a href="tel:+5511999999999">(11) 99999-9999</a></p>
                    </div>

                    <div class="contact__item">
                        <h2>Email</h2>
                        <p>
                            <a href="mailto:contato@lentesdotempo.com.br"
                                >contato@lentesdotempo.com.br</a
                            >
                        </p>
                    </div>

                    <div class="contact__item">
                        <h2>Endereço</h2>
                        <p>
                            Lentes do Tempo<br />
                            São Paulo - SP<br />
                            Brasil
                        </p>
                    </div>
                </div>

                <form class="contact__form">
                    <div class="form__group">
                        <label for="name">Nome:</label>
                        <input type="text" id="name" name="name" required />
                    </div>

                    <div class="form__group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required />
                    </div>

                    <div class="form__group">
                        <label for="message">Mensagem:</label>
                        <textarea
                            id="message"
                            name="message"
                            required
                        ></textarea>
                    </div>

                    <button type="submit" class="form__submit">Enviar</button>
                </form>
            </section>
        </main>
        <footer-component></footer-component>
    </body>
</html>
