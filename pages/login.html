<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login - Lentes do Tempo</title>
        <meta name="description" content="Acesse sua conta na Lentes do Tempo" />
        <link rel="stylesheet" href="../css/global.css" />
        <link rel="stylesheet" href="../css/components/header.css" />
        <link rel="stylesheet" href="../css/components/footer.css" />
        <link rel="stylesheet" href="../css/pages/login.css" />
        <link rel="stylesheet" href="../css/motions/transition.css" />
        <script src="../js/components/header.js" defer></script>
        <script src="../js/components/footer.js" defer></script>
        <script src="../js/motions/transition.js" defer></script>
    </head>
    <body>
        <header-component></header-component>
        <main>
            <div class="login-page">
                <div class="login-container">
                    <div class="login-header">
                        <img
                            src="../assets/icons/Logo.svg"
                            alt="Lentes do Tempo"
                            class="login-logo"
                        />
                        <h1 class="login-title">Bem-vindo de volta</h1>
                        <p class="login-subtitle">
                            Acesse sua conta para continuar
                        </p>
                    </div>

                    <div class="login-error" id="login-error">
                        Email ou senha inválidos. Por favor, tente novamente.
                    </div>

                    <form class="login-form" id="login-form">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="seu@email.com"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="password">Senha</label>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Sua senha"
                                required
                            />
                        </div>

                        <div class="form-options">
                            <label class="remember-me">
                                <input
                                    type="checkbox"
                                    id="remember"
                                    name="remember"
                                />
                                Lembrar-me
                            </label>
                            <a href="#" class="forgot-password">
                                Esqueceu a senha?
                            </a>
                        </div>

                        <button type="submit" class="login-button">
                            Entrar
                        </button>
                    </form>

                    <div class="login-divider">
                        <span>ou</span>
                    </div>

                    <p class="register-link">
                        Ainda não tem uma conta?
                        <a href="#">Cadastre-se</a>
                    </p>
                </div>
            </div>
        </main>
        <footer-component></footer-component>

        <script>
            document
                .getElementById("login-form")
                .addEventListener("submit", function (e) {
                    e.preventDefault();

                    const email = document.getElementById("email").value;
                    const password = document.getElementById("password").value;

                    // TODO: Implementar lógica de autenticação
                    console.log("Login:", { email, password });

                    // Exemplo de exibição de erro
                    // document.getElementById('login-error').classList.add('visible');
                });
        </script>
    </body>
</html>
