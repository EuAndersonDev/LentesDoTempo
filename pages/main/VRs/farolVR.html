<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="../../../assets/icons/Logo.svg"
        />
        <title>Meu Vídeo VR 360°</title>
        <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
        <link rel="stylesheet" href="../../../css/global.css" />
        <link rel="stylesheet" href="../../../css/pages/main/farolVR.css" />
    </head>
    <body>
        <div id="overlay">
            <button onclick="togglePlay()">▶ Play</button>
            <button onclick="toggleVR()">VR</button>
        </div>

        <a-scene>
            <a-assets>
                <video
                    id="video360"
                    src="../../../assets/imgs/VideosVR/VR_Storm_Near_Lighthouse_of_Alexandria.mp4"
                    crossorigin="anonymous"
                    preload="auto"
                    loop
                ></video>
            </a-assets>

            <!-- Agora descomentado e usando #video360 corretamente -->
            <a-videosphere src="#video360" rotation="0 -90 0"> </a-videosphere>

            <a-camera>
                <a-cursor color="white"></a-cursor>
            </a-camera>
        </a-scene>

        <script>
            const vid = document.getElementById("video360");
            let playing = false;

            function togglePlay() {
                if (playing) {
                    vid.pause();
                    document.querySelector("#overlay button").textContent =
                        "▶ Play";
                } else {
                    vid.play();
                    document.querySelector("#overlay button").textContent =
                        "⏸ Pause";
                }
                playing = !playing;
            }

            function toggleVR() {
                const scene = document.querySelector("a-scene");
                scene.enterVR();
            }
        </script>

        <!-- Speech API Scripts -->
        <script src="../../../js/services/speechApiConfig.js" defer></script>
        <script src="../../../js/services/speechApi.js" defer></script>
        <script src="../../../js/services/voiceControlWidget.js" defer></script>
        <script defer>
            document.addEventListener("DOMContentLoaded", function () {
                initVoiceControlWidget({
                    position: "bottom-left",
                    theme: "dark",
                    enabled: true,
                });
            });
        </script>

        <script
            src="https://cdn.userway.org/widget.js"
            data-account="nKnoa78Hw3"
        ></script>
    </body>
</html>
