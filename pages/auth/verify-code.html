<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="../../assets/icons/Logo.svg"
        />
        <title>Verificar Código - Lentes do Tempo</title>
        <meta
            name="description"
            content="Verifique o código de recuperação de senha"
        />
        <link rel="stylesheet" href="../../css/global.css" />
        <link rel="stylesheet" href="../../css/components/header.css" />
        <link rel="stylesheet" href="../../css/components/footer.css" />
        <link rel="stylesheet" href="../../css/pages/auth/verify-code.css" />
        <link rel="stylesheet" href="../../css/motions/transition.css" />
        <script src="../../api/config.js" defer></script>
        <script src="../../js/components/header.js" defer></script>
        <script src="../../js/components/footer.js" defer></script>
        <script src="../../js/motions/transition.js" defer></script>
        <script src="../../js/pages/verify-code.js" defer></script>
    </head>
    <body>
        <header-component></header-component>
        <main>
            <div class="verify-code-page">
                <div class="verify-code-container">
                    <div class="verify-code-header">
                        <img
                            src="../../assets/icons/Logo.svg"
                            alt="Lentes do Tempo"
                            class="verify-code-logo"
                        />
                        <h1 class="verify-code-title">Verificar código</h1>
                        <p class="verify-code-subtitle">
                            Digite o código de 6 dígitos enviado para seu email.
                        </p>
                    </div>

                    <div class="verify-code-error" id="verify-error"></div>

                    <div class="verify-code-success" id="verify-success">
                        Código verificado! Redirecionando...
                    </div>

                    <form class="verify-code-form" id="verify-code-form">
                        <div class="code-input-container">
                            <input
                                type="text"
                                id="code"
                                name="code"
                                class="code-input"
                                placeholder="000000"
                                maxlength="6"
                                pattern="[0-9]{6}"
                                required
                            />
                        </div>

                        <p class="resend-text">
                            Não recebeu o código?
                            <a href="#" id="resend-link">Reenviar</a>
                        </p>

                        <button
                            type="submit"
                            class="verify-code-button"
                            id="verify-submit-button"
                        >
                            Verificar código
                        </button>
                    </form>

                    <p class="back-to-login">
                        <a href="forgot-password.html">Voltar</a>
                    </p>
                </div>
            </div>
        </main>
        <footer-component></footer-component>
        
        <!-- Speech API Scripts -->
        <script src="../../js/services/speechApiConfig.js" defer></script>
        <script src="../../js/services/speechApi.js" defer></script>
        <script src="../../js/services/voiceControlWidget.js" defer></script>
        <script defer>
            document.addEventListener('DOMContentLoaded', function() {
                initVoiceControlWidget({
                    position: 'bottom-left',
                    theme: 'dark',
                    enabled: true
                });
            });
        </script>
    </body>
</html>
