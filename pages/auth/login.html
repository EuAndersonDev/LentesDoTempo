<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="../../assets/icons/Logo.svg"
        />
        <title>Login - Lentes do Tempo</title>
        <meta
            name="description"
            content="Acesse sua conta na Lentes do Tempo"
        />
        <link rel="stylesheet" href="../../css/global.css" />
        <link rel="stylesheet" href="../../css/components/header.css" />
        <link rel="stylesheet" href="../../css/components/footer.css" />
        <link rel="stylesheet" href="../../css/pages/auth/login.css" />
        <link rel="stylesheet" href="../../css/motions/transition.css" />
        <script src="../../api/config.js" defer></script>
        <script src="../../js/components/header.js" defer></script>
        <script src="../../js/components/footer.js" defer></script>
        <script src="../../js/motions/transition.js" defer></script>
        <script src="../../js/pages/login.js" defer></script>
    </head>
    <body>
        <header-component></header-component>
        <main>
            <div class="login-page">
                <div class="login-container">
                    <div class="login-header">
                        <img
                            src="../../assets/icons/Logo.svg"
                            alt="Lentes do Tempo"
                            class="login-logo"
                        />
                        <h1 class="login-title">Bem-vindo de volta</h1>
                        <p class="login-subtitle">
                            Acesse sua conta para continuar
                        </p>
                    </div>

                    <div class="login-error" id="login-error">
                        Email ou senha inválidos. Por favor, tente novamente.
                    </div>

                    <form class="login-form" id="login-form">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="seu@email.com"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="password">Senha</label>
                            <div class="password-field">
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    placeholder="Sua senha"
                                    required
                                />
                                <button
                                    type="button"
                                    class="password-toggle"
                                    data-target="password"
                                    aria-label="Mostrar senha"
                                    aria-pressed="false"
                                >
                                    <svg
                                        viewBox="0 0 24 24"
                                        aria-hidden="true"
                                        focusable="false"
                                    >
                                        <path
                                            d="M12 5c5.5 0 9.6 4.4 10.8 6-.9 1.2-2.8 3.4-5.7 5l-1.4-1.4C17.8 12.9 19.5 11 20.2 10.1 18.7 8.3 15.6 6 12 6c-1.1 0-2.2.2-3.2.5L7.1 5.1C8.6 5 10.2 5 12 5Zm0 14c-5.5 0-9.6-4.4-10.8-6 .8-1.1 2.5-3.2 5.1-4.8l1.4 1.4C6.7 11.2 5.3 12.8 4.8 13.5 6.3 15.3 9.4 17.6 12 17.6c1.1 0 2.2-.2 3.2-.5l1.6 1.6c-1.5.3-3.1.3-4.8.3Zm0-11.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Zm0 2a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Z"
                                        />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="remember-me">
                                <input
                                    type="checkbox"
                                    id="remember"
                                    name="remember"
                                />
                                Lembrar-me
                            </label>
                            <a
                                href="forgot-password.html"
                                class="forgot-password"
                            >
                                Esqueceu a senha?
                            </a>
                        </div>

                        <button type="submit" class="login-button">
                            Entrar
                        </button>
                    </form>

                    <div class="login-divider">
                        <span>ou</span>
                    </div>

                    <p class="register-link">
                        Ainda não tem uma conta?
                        <a href="register.html">Cadastre-se</a>
                    </p>
                </div>
            </div>
        </main>
        <footer-component></footer-component>
        
        <!-- Speech API Scripts -->
        <script src="../../js/services/speechApiConfig.js" defer></script>
        <script src="../../js/services/speechApi.js" defer></script>
        <script src="../../js/services/voiceControlWidget.js" defer></script>
        <script defer>
            document.addEventListener('DOMContentLoaded', function() {
                initVoiceControlWidget({
                    position: 'bottom-right',
                    theme: 'dark',
                    enabled: true
                });
            });
        </script>
    </body>
</html>
