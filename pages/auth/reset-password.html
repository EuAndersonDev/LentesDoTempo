<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="../../assets/icons/Logo.svg"
        />
        <title>Redefinir Senha - Lentes do Tempo</title>
        <meta
            name="description"
            content="Redefina sua senha da Lentes do Tempo"
        />
        <link rel="stylesheet" href="../../css/global.css" />
        <link rel="stylesheet" href="../../css/components/header.css" />
        <link rel="stylesheet" href="../../css/components/footer.css" />
        <link rel="stylesheet" href="../../css/pages/auth/reset-password.css" />
        <link rel="stylesheet" href="../../css/motions/transition.css" />
        <script src="../../api/config.js" defer></script>
        <script src="../../js/components/header.js" defer></script>
        <script src="../../js/components/footer.js" defer></script>
        <script src="../../js/motions/transition.js" defer></script>
        <script src="../../js/pages/reset-password.js" defer></script>
    </head>
    <body>
        <header-component></header-component>
        <main>
            <div class="reset-password-page">
                <div class="reset-password-container">
                    <div class="reset-password-header">
                        <img
                            src="../../assets/icons/Logo.svg"
                            alt="Lentes do Tempo"
                            class="reset-password-logo"
                        />
                        <h1 class="reset-password-title">Redefinir senha</h1>
                        <p class="reset-password-subtitle">
                            Crie uma nova senha para sua conta.
                        </p>
                    </div>

                    <div class="reset-password-error" id="reset-error"></div>

                    <div class="reset-password-success" id="reset-success">
                        Senha redefinida com sucesso! Redirecionando...
                    </div>

                    <form class="reset-password-form" id="reset-password-form">
                        <div class="form-group">
                            <label for="resetEmail">E-mail</label>
                            <input
                                type="email"
                                id="resetEmail"
                                name="resetEmail"
                                placeholder="Digite o e-mail da conta"
                                autocomplete="email"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="verificationCode"
                                >Codigo de verificacao</label
                            >
                            <input
                                type="text"
                                id="verificationCode"
                                name="verificationCode"
                                placeholder="Digite o codigo de 6 digitos"
                                inputmode="numeric"
                                maxlength="6"
                                pattern="[0-9]{6}"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="newPassword">Nova senha</label>
                            <input
                                type="password"
                                id="newPassword"
                                name="newPassword"
                                placeholder="Crie uma nova senha"
                                required
                                minlength="6"
                            />
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword"
                                >Confirmar nova senha</label
                            >
                            <input
                                type="password"
                                id="confirmPassword"
                                name="confirmPassword"
                                placeholder="Confirme sua nova senha"
                                required
                            />
                        </div>

                        <div class="password-requirements">
                            <p>A senha deve ter:</p>
                            <ul>
                                <li id="req-length">Pelo menos 6 caracteres</li>
                            </ul>
                        </div>

                        <button
                            type="submit"
                            class="reset-password-button"
                            id="reset-submit-button"
                        >
                            Redefinir senha
                        </button>
                    </form>
                </div>
            </div>
        </main>
        <footer-component></footer-component>
    </body>
</html>
