<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Esqueceu a Senha - Lentes do Tempo</title>
        <meta
            name="description"
            content="Recupere sua senha da Lentes do Tempo"
        />
        <link rel="stylesheet" href="../css/global.css" />
        <link rel="stylesheet" href="../css/components/header.css" />
        <link rel="stylesheet" href="../css/components/footer.css" />
        <link rel="stylesheet" href="../css/pages/forgot-password.css" />
        <link rel="stylesheet" href="../css/motions/transition.css" />
        <script src="../api/config.js" defer></script>
        <script src="../js/components/header.js" defer></script>
        <script src="../js/components/footer.js" defer></script>
        <script src="../js/motions/transition.js" defer></script>
        <script src="../js/pages/forgot-password.js" defer></script>
    </head>
    <body>
        <header-component></header-component>
        <main>
            <div class="forgot-password-page">
                <div class="forgot-password-container">
                    <div class="forgot-password-header">
                        <img
                            src="../assets/icons/Logo.svg"
                            alt="Lentes do Tempo"
                            class="forgot-password-logo"
                        />
                        <h1 class="forgot-password-title">Esqueceu a senha?</h1>
                        <p class="forgot-password-subtitle">
                            Sem problemas! Digite seu email e enviaremos um
                            código de recuperação.
                        </p>
                    </div>

                    <div class="forgot-password-error" id="forgot-error"></div>

                    <div class="forgot-password-success" id="forgot-success">
                        Código enviado! Verifique seu email.
                    </div>

                    <form
                        class="forgot-password-form"
                        id="forgot-password-form"
                    >
                        <div class="form-group">
                            <label for="email">Email cadastrado</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="seu@email.com"
                                required
                            />
                        </div>

                        <button
                            type="submit"
                            class="forgot-password-button"
                            id="forgot-submit-button"
                        >
                            Enviar código
                        </button>
                    </form>

                    <p class="back-to-login">
                        Lembrou sua senha?
                        <a href="login.html">Voltar ao login</a>
                    </p>
                </div>
            </div>
        </main>
        <footer-component></footer-component>
    </body>
</html>
