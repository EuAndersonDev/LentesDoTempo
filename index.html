<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="/assets/icons/Logo.svg" />
        <title>Lentes do Tempo</title>
        <link rel="stylesheet" href="./css/pages/index.css" />
        <link rel="stylesheet" href="./css/motions/transition.css" />
        <script src="./js/motions/script.js" defer></script>
        <script src="./js/motions/transition.js" defer></script>
        <link rel="stylesheet" href="./css/global.css" />
    </head>
    <body>
        <main class="scroll-bound">
            <div class="sticky-container" id="video-container">
                <video id="museum-video" playsinline preload="auto">
                    <source
                        src="/assets/imgs/Home/museum_optimized.mp4"
                        type="video/mp4"
                    />
                </video>

                <nav class="menu-overlay" id="menu-overlay">
                    <div
                        class="hotspot"
                        style="top: 40%; left: 18%"
                        data-x="18"
                        data-y="40"
                        data-target="/pages/main/galeria.html"
                    >
                        <img
                            src="/assets/icons/Home/Galeria.svg"
                            alt="Galeria"
                            class="hotspot__icon"
                        />
                        <span class="tooltip">Explorar Galeria</span>
                    </div>

                    <div
                        class="hotspot"
                        style="top: 40%; left: 82%"
                        data-x="82"
                        data-y="40"
                        data-target="/pages/main/servicos.html"
                    >
                        <img
                            src="/assets/icons/Home/Contatos.svg"
                            alt="Serviços"
                            class="hotspot__icon"
                        />
                        <span class="tooltip">Acessar Serviços</span>
                    </div>

                    <div
                        class="hotspot"
                        style="top: 75%; left: 18%"
                        data-x="18"
                        data-y="75"
                        data-target="/pages/main/sobrenos.html"
                    >
                        <img
                            src="/assets/icons/Home/NossaHistoria.svg"
                            alt="Nossa História"
                            class="hotspot__icon"
                        />
                        <span class="tooltip">Nossa História</span>
                    </div>

                    <div
                        class="hotspot"
                        style="top: 75%; left: 82%"
                        data-x="82"
                        data-y="75"
                        data-target="/pages/main/parcerias.html"
                    >
                        <img
                            src="/assets/icons/Home/Parcerias.svg"
                            alt="Parcerias"
                            class="hotspot__icon"
                        />
                        <span class="tooltip">Parcerias</span>
                    </div>

                    <div
                        class="hotspot"
                        style="top: 46%; left: 50%"
                        data-x="50"
                        data-y="46"
                        data-target="/pages/main/eventos.html"
                    >
                        <img
                            src="/assets/icons/Home/Eventos.svg"
                            alt="Eventos"
                            class="hotspot__icon"
                        />
                        <span class="tooltip">Eventos</span>
                    </div>

                    <div
                        class="hotspot"
                        style="top: 76%; left: 50%"
                        data-x="50"
                        data-y="76"
                        data-target="/pages/main/reloadpage.html"
                    >
                        <img
                            src="/assets/icons/Home/ReconstrucaoCenario.svg"
                            alt="Reconstrução Cenário"
                            class="hotspot__icon"
                        />
                        <span class="tooltip">Reconstrução Cenário</span>
                    </div>
                </nav>
            </div>
        </main>

        <div class="logo-watermark">
            <img src="/assets/icons/Logo.svg" alt="Lentes do Tempo" />
        </div>
    </body>
</html>
